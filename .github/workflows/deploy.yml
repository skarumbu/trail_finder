name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/trail-finder:latest .

      - name: Push Docker image to ACR
        run: |
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/trail-finder:latest

      - name: Update Container App
        run: |
          az containerapp update \
            --name trail-finder-prod \
            --resource-group my-website-prod-rg \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/trail-finder:latest \
            --revision-suffix "deploy-$(echo ${{ github.sha }} | cut -c1-7)"

  update-architecture:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout my-website
        uses: actions/checkout@v4
        with:
          repository: skarumbu/my-website
          token: ${{ secrets.MY_WEBSITE_DISPATCH_TOKEN }}

      - name: Update deploy metadata
        run: |
          git pull origin main
          DATE=$(date -u +%Y-%m-%d)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          python3 -c "
import json
with open('src/architecture-metadata.json') as f:
    meta = json.load(f)
meta['trail-finder'] = {'lastDeploy': '$DATE', 'commitSha': '$SHORT_SHA'}
with open('src/architecture-metadata.json', 'w') as f:
    json.dump(meta, f, indent=2)
    f.write('\n')
"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/architecture-metadata.json
          git diff --staged --quiet && exit 0
          git commit -m "chore: update trail-finder deploy metadata"
          git push
