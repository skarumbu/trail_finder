name: Notify my-website on deploy

on:
  push:
    branches: [master]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger architecture update
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.MY_WEBSITE_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/skarumbu/my-website/dispatches \
            -d '{"event_type":"architecture-update","client_payload":{"source":"trail_finder"}}'
